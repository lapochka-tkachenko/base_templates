name: CI

on:
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.2
      - run: ruff check --config=code_quality/.ruff.toml apps/
      - run: ruff format --check --config=code_quality/.ruff.toml apps/

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements/requirements_dev
      - run: mypy --config-file=code_quality/mypy.ini apps/

  pylint:
    name: pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements/requirements_dev
      - run: pylint --rcfile=code_quality/pylint.toml apps/

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements/requirements_dev
      - run: pytest tests/ -q
